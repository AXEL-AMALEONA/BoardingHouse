<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding House Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            flex-direction: column;
            margin: 20px;
            
            padding= 20px;
            margin-block-start: 100px;
            margin-inline: 400px;
            background-color: rgb(167, 167, 149);
        }
        form {
            width: 340px;
             background-color: #c0bdb0;  
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
            
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        #calculate-btn {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #e9d49d;
            color: rgb(27, 19, 19);
            border: none;
            transition: background-color 0.3s;
            cursor: pointer;
            font-weight: bold;
        }
        #calculate-btn:hover  {
            background-color: #6ab2d4;
            transform: translateY(10px) scale(1.05);
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #c0bdb0;
        }
    </style>
</head>
<body>
    <form id="bh-form">
        <label for="rent">Total Bill:</label>
        <input type="number" id="rent" name="rent" required>
        <br>
        <label for="Waterbill">Enter Water Bill:</label>
        <input type="number" id="Waterbill" name="Waterbill" required>
        <br>
        <label for="Msc">Enter Msc:</label>
        <input type="Number" id="Msc" name="Msc" required>
        <br>
        <label for="Ireneo">Ireneo:</label>
        <input type="Number" id="Ireneo" name="Ireneo" required>
        <br>

         <label for="Holly">Holly:</label>
        <input type="Number" id="Holly" name="Holly" required>
        <br>
         <label for="Rifanie">Rifanie:</label>
        <input type="Number" id="Rifanie" name="Rifanie" required>
        <br>
         <label for="Leiz">Leiz:</label>
        <input type="Number" id="Leiz" name="Leiz" required>
        <br>
         <label for="Axel">Axel:</label>
        <input type="Number" id="Axel" name="Axel" required>
        <br>
        <button type="submit" id="calculate-btn">Calculate</button>
    </form>
    <div id="result"></div>
    <script src="bh.js"></script>
</body>
</html>
